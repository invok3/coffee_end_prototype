<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 500 1000">

<defs>

<linearGradient id="laneFill" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#5C3D2E" stop-opacity=".48"/>
<stop offset="100%" stop-color="#5C3D2E" stop-opacity=".40"/>
</linearGradient>

<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#5C3D2E" stop-opacity=".20"/>
<stop offset="100%" stop-color="#5C3D2E" stop-opacity=".25"/>
</linearGradient>

</defs>

<!-- background -->
<rect width="500" height="1000" fill="#FFFAF5"/>

<!-- grass -->
<rect x="0" y="0" width="60" height="1000"
fill="url(#grass)"/>

<!-- sidewalk -->
<rect x="60" y="0" width="18" height="1000"
fill="#5C3D2E"
opacity=".26"/>

<!-- curb -->
<rect x="78" y="0" width="2" height="1000"
fill="#5C3D2E"
opacity=".55"/>

<!-- selected lane -->
<rect x="80" y="0" width="420" height="1000"
fill="url(#laneFill)"/>

<!-- edge -->
<rect x="80" y="0" width="2" height="1000"
fill="#5C3D2E"
opacity=".58"/>

<!-- center divider -->
<line
x1="499"
y1="0"
x2="499"
y2="1000"
stroke="#5C3D2E"
stroke-width="2"
stroke-opacity=".8"
stroke-dasharray="24 20"/>

<!-- parking rectangles -->
<rect x="12" y="120" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="12" y="250" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="12" y="520" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="12" y="760" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

</svg>
