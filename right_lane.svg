<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 500 1000">

<defs>

<linearGradient id="laneFill" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#5C3D2E" stop-opacity=".48"/>
<stop offset="100%" stop-color="#5C3D2E" stop-opacity=".40"/>
</linearGradient>

<linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#5C3D2E" stop-opacity=".20"/>
<stop offset="100%" stop-color="#5C3D2E" stop-opacity=".25"/>
</linearGradient>

</defs>

<rect width="500" height="1000" fill="#FFFAF5"/>

<!-- lane -->
<rect x="0" y="0" width="420" height="1000"
fill="url(#laneFill)"/>

<!-- divider -->
<line
x1="1"
y1="0"
x2="1"
y2="1000"
stroke="#5C3D2E"
stroke-width="2"
stroke-opacity=".8"
stroke-dasharray="24 20"/>

<!-- curb -->
<rect x="420" y="0" width="2" height="1000"
fill="#5C3D2E"
opacity=".55"/>

<!-- sidewalk -->
<rect x="422" y="0" width="18" height="1000"
fill="#5C3D2E"
opacity=".26"/>

<!-- grass -->
<rect x="440" y="0" width="60" height="1000"
fill="url(#grass)"/>

<!-- parking -->
<rect x="452" y="170" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="452" y="390" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="452" y="640" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

<rect x="452" y="850" width="36" height="60"
rx="3"
fill="#5C3D2E"
opacity=".24"/>

</svg>
